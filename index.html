<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landscaping CRM</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      background: #f4f4f4; 
    }
    .tabs { 
      display: flex; 
      background: #333; 
      overflow-x: auto; 
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .tab { 
      padding: 15px 20px; 
      color: white; 
      cursor: pointer; 
      white-space: nowrap;
      flex: 1;
      text-align: center;
    }
    .tab.active { 
      background: #4CAF50; 
      font-weight: bold;
    }
    table { 
      width: 100%; 
      border-collapse: collapse; 
      background: white; 
      margin-top: 10px;
    }
    th, td { 
      padding: 12px; 
      text-align: left; 
      border-bottom: 1px solid #ddd; 
    }
    th { 
      background: #4CAF50; 
      color: white; 
      position: sticky;
      top: 57px;
    }
    .paid { color: green; font-weight: bold; }
    .not-paid { color: red; font-weight: bold; }
    tr:hover { background: #f9f9f9; }

    .address-link {
      color: #2196F3;
      text-decoration: underline;
      cursor: pointer;
    }
    .address-link:hover { color: #0b7dda; }

    .modal { 
      position: fixed; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      background: rgba(0,0,0,0.7); 
      display: none; 
      align-items: center; 
      justify-content: center; 
      z-index: 100;
    }
    .modal-content { 
      background: white; 
      padding: 25px; 
      border-radius: 8px; 
      width: 90%; 
      max-width: 520px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    input, textarea, select { 
      width: 100%; 
      padding: 10px; 
      margin: 8px 0; 
      box-sizing: border-box; 
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button { 
      padding: 10px 15px; 
      margin: 8px 5px 0 0; 
      background: #4CAF50; 
      color: white; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer;
    }
    button:hover { background: #45a049; }
    .cancel-btn { background: #999; }
    .cancel-btn:hover { background: #777; }
    .delete-btn { background: #f44336; }
    .delete-btn:hover { background: #d32f2f; }
  </style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" onclick="switchDay(0)">Monday</div>
    <div class="tab" onclick="switchDay(1)">Tuesday</div>
    <div class="tab" onclick="switchDay(2)">Wednesday</div>
    <div class="tab" onclick="switchDay(3)">Thursday</div>
    <div class="tab" onclick="switchDay(4)">Friday</div>
    <div class="tab" onclick="switchDay(5)">Saturday</div>
    <div class="tab" onclick="switchDay(6)">Sunday</div>
  </div>

  <div style="padding: 10px; text-align: right;">
    <button onclick="showAddModal()">+ Add New Client</button>
  </div>

  <table id="clientTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Address</th>
        <th>Paid</th>
        <th>Comments</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <!-- Edit Modal -->
  <div class="modal" id="detailModal">
    <div class="modal-content">
      <h3>Edit Client</h3>
      <input type="text" id="editName" placeholder="Client Name">
      <input type="text" id="editAddress" placeholder="Address">
      
      <p><strong>Paid this week:</strong> 
        <span id="modalPaid" style="font-weight:bold; font-size:1.1em;"></span>
        <button onclick="togglePaid()">Toggle Paid</button>
      </p>
      
      <p><strong>Comments:</strong></p>
      <textarea id="modalComments" rows="5" placeholder="Add notes..."></textarea>
      
      <div style="margin-top: 20px;">
        <button onclick="saveAndClose()">Save & Close</button>
        <button onclick="closeModal()" class="cancel-btn">Cancel</button>
        <button onclick="deleteClient()" class="delete-btn" style="float:right;">Delete Client</button>
      </div>
    </div>
  </div>

  <!-- Add New Client Modal -->
  <div class="modal" id="addModal">
    <div class="modal-content">
      <h3>Add New Client</h3>
      <input type="text" id="addName" placeholder="Client Name">
      <input type="text" id="addAddress" placeholder="Address">
      
      <label><strong>Day of the week:</strong></label>
      <select id="addDay">
        <option value="0">Monday</option>
        <option value="1">Tuesday</option>
        <option value="2">Wednesday</option>
        <option value="3">Thursday</option>
        <option value="4">Friday</option>
        <option value="5">Saturday</option>
        <option value="6">Sunday</option>
      </select>
      
      <p><strong>Paid this week:</strong> 
        <input type="checkbox" id="addPaid" checked> Yes
      </p>
      
      <p><strong>Comments:</strong></p>
      <textarea id="addComments" rows="4" placeholder="Add notes..."></textarea>
      
      <div style="margin-top: 20px;">
        <button onclick="addClient()">Add Client</button>
        <button onclick="closeAddModal()" class="cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let clients = [];
    let currentDay = 0;
    let currentClientIndex = -1;

    const STORAGE_KEY = "landscapingCRM_clients";

    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        clients = JSON.parse(saved);
      } else {
        clients = [
          {name:"John Smith", address:"123 Oak Lane", day:0, paid:true, comments:"Watch for low branches"},
          {name:"Maria Garcia", address:"456 Pine Street", day:0, paid:false, comments:"Dog in backyard"},
          {name:"David Chen", address:"789 Maple Ave", day:1, paid:true, comments:""},
          {name:"Lisa Thompson", address:"321 Elm Drive", day:2, paid:false, comments:"Needs extra weeding"},
          {name:"Robert Wilson", address:"654 Birch Blvd", day:3, paid:true, comments:"New flower bed requested"}
        ];
        saveData();
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(clients));
    }

    function renderTable(day) {
      currentDay = day;
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";

      const filtered = clients.filter(c => c.day === day);

      if (filtered.length === 0) {
        const row = document.createElement("tr");
        row.innerHTML = `<td colspan="4" style="text-align:center; padding:40px; color:#666;">No clients scheduled for this day.</td>`;
        tbody.appendChild(row);
        return;
      }

      filtered.forEach((client) => {
        const realIndex = clients.indexOf(client);
        const row = document.createElement("tr");
        row.innerHTML = `
          <td onclick="showDetail(${realIndex})" style="cursor:pointer;">${client.name}</td>
          <td onclick="event.stopImmediatePropagation(); openMaps('${client.address}')">
            <span class="address-link">${client.address}</span>
          </td>
          <td onclick="showDetail(${realIndex})" style="cursor:pointer;" class="${client.paid ? 'paid' : 'not-paid'}">
            ${client.paid ? 'YES' : 'NO'}
          </td>
          <td onclick="showDetail(${realIndex})" style="cursor:pointer;">${client.comments || ''}</td>
        `;
        tbody.appendChild(row);
      });
    }

    // Open address in phone GPS / Maps
    function openMaps(address) {
      const encodedAddress = encodeURIComponent(address);
      // Try geo: URI first (best for mobile GPS apps)
      const geoUrl = `geo:0,0?q=${encodedAddress}`;
      
      // Fallback to Google Maps if geo: fails
      const googleUrl = `https://www.google.com/maps/search/?api=1&query=${encodedAddress}`;
      
      // Try geo first, fallback to Google Maps
      window.location.href = geoUrl;
      
      // If geo doesn't work (desktop), open Google Maps after a short delay
      setTimeout(() => {
        if (document.visibilityState === "visible") {
          window.open(googleUrl, '_blank');
        }
      }, 500);
    }

    function switchDay(day) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === day));
      renderTable(day);
    }

    function showDetail(index) {
      currentClientIndex = index;
      const c = clients[index];

      document.getElementById("editName").value = c.name;
      document.getElementById("editAddress").value = c.address;
      document.getElementById("modalPaid").textContent = c.paid ? "YES" : "NO";
      document.getElementById("modalPaid").style.color = c.paid ? "green" : "red";
      document.getElementById("modalComments").value = c.comments || "";

      document.getElementById("detailModal").style.display = "flex";
    }

    function togglePaid() {
      if (currentClientIndex === -1) return;
      const c = clients[currentClientIndex];
      c.paid = !c.paid;
      document.getElementById("modalPaid").textContent = c.paid ? "YES" : "NO";
      document.getElementById("modalPaid").style.color = c.paid ? "green" : "red";
    }

    function saveAndClose() {
      if (currentClientIndex === -1) return;
      
      const c = clients[currentClientIndex];
      c.name = document.getElementById("editName").value.trim();
      c.address = document.getElementById("editAddress").value.trim();
      c.comments = document.getElementById("modalComments").value.trim();

      saveData();
      closeModal();
      renderTable(currentDay);
    }

    function deleteClient() {
      if (currentClientIndex === -1) return;
      if (!confirm("Delete this client permanently?")) return;

      clients.splice(currentClientIndex, 1);
      saveData();
      closeModal();
      renderTable(currentDay);
    }

    function closeModal() {
      document.getElementById("detailModal").style.display = "none";
      currentClientIndex = -1;
    }

    // Add Client Functions
    function showAddModal() {
      document.getElementById("addName").value = "";
      document.getElementById("addAddress").value = "";
      document.getElementById("addDay").value = currentDay; // Default to current day
      document.getElementById("addPaid").checked = true;
      document.getElementById("addComments").value = "";
      document.getElementById("addModal").style.display = "flex";
    }

    function closeAddModal() {
      document.getElementById("addModal").style.display = "none";
    }

    function addClient() {
      const name = document.getElementById("addName").value.trim();
      const address = document.getElementById("addAddress").value.trim();
      const day = parseInt(document.getElementById("addDay").value);
      const paid = document.getElementById("addPaid").checked;
      const comments = document.getElementById("addComments").value.trim();

      if (!name || !address) {
        alert("Name and Address are required!");
        return;
      }

      clients.push({
        name: name,
        address: address,
        day: day,
        paid: paid,
        comments: comments
      });

      saveData();
      closeAddModal();
      renderTable(currentDay);
    }

    // Initialize
    function init() {
      loadData();
      renderTable(0);
    }

    init();
  </script>
</body>
</html>
